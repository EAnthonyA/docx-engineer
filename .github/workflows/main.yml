name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      executor: ${{ steps.changes.outputs.executor }}
      sandbox: ${{ steps.changes.outputs.sandbox }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha || 'HEAD~1' }} HEAD)
          echo "frontend=$(echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "backend=$(echo "$CHANGED" | grep -q '^backend/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "executor=$(echo "$CHANGED" | grep -q '^executor/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "sandbox=$(echo "$CHANGED" | grep -q '^sandbox/' && echo true || echo false)" >> $GITHUB_OUTPUT

  lint-test-backend:
    name: Backend Lint & Test
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' && vars.SKIP_CI != 'true'
    uses: ./.github/workflows/lint-test-backend.yml

  lint-test-frontend:
    name: Frontend Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' && vars.SKIP_CI != 'true'
    uses: ./.github/workflows/lint-test-frontend.yml

